name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  language-lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run evidence language linter
        run: python tools/language_linter.py

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pre-download embedding model
        run: |
          python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"

      - name: Run full test suite
        # Whole suite gates the build. The live-server websocket stress test
        # boots a uvicorn subprocess and is exercised in a separate,
        # non-gating job below.
        run: PYTHONPATH=. pytest --ignore=tests/test_ws_stress.py -q
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"
          PITWALL_DECODE_BACKEND: rules

  ws-stress:
    runs-on: ubuntu-latest
    # Live-server websocket load test — informational, does not gate merges
    # (timing-sensitive; boots a real uvicorn on port 8000).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pre-download embedding model
        run: |
          python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"

      - name: Run websocket stress test
        run: PYTHONPATH=. pytest tests/test_ws_stress.py -q
        env:
          HF_HUB_DISABLE_TELEMETRY: "1"
          PITWALL_DECODE_BACKEND: rules
